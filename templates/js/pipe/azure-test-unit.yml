trigger: none

pr:
  branches:
    include:
      - main
      - pre-release

variables:
  nodeVersion: '22.x'

pool:
  vmImage: 'ubuntu-latest'

jobs:
- job: test
  displayName: 'Run Tests'

  steps:
  - checkout: self
    displayName: 'Checkout repository'

  - task: UseNode@1
    displayName: 'Setup Node.js $(nodeVersion)'
    inputs:
      version: '$(nodeVersion)'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm test
    displayName: 'Run tests'