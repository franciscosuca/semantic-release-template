trigger:
  branches:
    include:
      - main
      - pre-release

pr: none

variables:
  nodeVersion: '20.x'
  SR_VERSION: '24.0.0'
  SR_CHANGELOG_VERSION: '6.0.3'
  SR_COMMIT_ANALYZER_VERSION: '13.0.1'
  SR_GIT_VERSION: '10.0.1'
  SR_GITHUB_VERSION: '11.0.6'
  SR_NPM_VERSION: '12.0.2'
  SR_RELEASE_NOTES_VERSION: '14.1.0'
  CC_CONVENTIONALCOMMITS_VERSION: '8.0.0'

pool:
  vmImage: 'ubuntu-latest'

jobs:
- job: semantic_release
  displayName: 'Semantic Release and Tagging'

  steps:
  - checkout: self
    displayName: 'Checkout repository'
    persistCredentials: true
    fetchDepth: 0

  - script: |
      git config --global user.email "azure-pipelines@microsoft.com"
      git config --global user.name "Azure Pipelines"
    displayName: 'Configure Git user'

  - task: UseNode@1
    displayName: 'Setup Node.js $(nodeVersion)'
    inputs:
      version: '$(nodeVersion)'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm test --if-present
    displayName: 'Run tests (if present)'

  - script: npm run build --if-present
    displayName: 'Build (if present)'

  - script: |
      npx \
        --package semantic-release@$(SR_VERSION) \
        --package @semantic-release/changelog@$(SR_CHANGELOG_VERSION) \
        --package @semantic-release/commit-analyzer@$(SR_COMMIT_ANALYZER_VERSION) \
        --package @semantic-release/git@$(SR_GIT_VERSION) \
        --package @semantic-release/github@$(SR_GITHUB_VERSION) \
        --package @semantic-release/npm@$(SR_NPM_VERSION) \
        --package @semantic-release/release-notes-generator@$(SR_RELEASE_NOTES_VERSION) \
        --package conventional-changelog-conventionalcommits@$(CC_CONVENTIONALCOMMITS_VERSION) \
        semantic-release
    displayName: 'Run Semantic Release'
    env:
      GH_TOKEN: $(GITHUB_TOKEN)
      GITHUB_TOKEN: $(GITHUB_TOKEN)
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
